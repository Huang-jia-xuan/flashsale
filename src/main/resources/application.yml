server:
  port: 8089

flash-sale:
  mq:
    enabled: true # 设为 true 并启动 RabbitMQ 后，异步下单功能生效

spring:
  # ---- 数据源 ----
  datasource:
    url: jdbc:mysql://localhost:3306/flash_sale?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: bkhp70dn.
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- Redis ----
  redis:
    host: localhost
    port: 6379
    database: 0

  # ---- RabbitMQ ----
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  # ---- Jackson ----
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# ---- MyBatis-Plus ----
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: t_

# ---- 日志 ----
logging:
  level:
    com.ttnn.flashsale: debug
